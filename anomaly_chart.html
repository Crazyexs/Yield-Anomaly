<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quant Anomalies | Yield Anomaly Detection</title>
    <meta name="description" content="Real-time quantitative anomaly detection.">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="style.css">

    <!-- Chart Library -->
    <script src="https://unpkg.com/lightweight-charts@3.8.0/dist/lightweight-charts.standalone.production.js"></script>
</head>

<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <span class="logo-text">YIELD_ANOMALY_ENGINE</span>
            </div>

            <nav class="nav-links">
                <a href="/" class="nav-link">DASHBOARD</a>
                <a href="/chart" class="nav-link active">CHART_VIEW</a>
            </nav>

            <div class="status-indicator">
                <div class="status-dot ok"></div>
                <span class="status-text mono" id="statusText">SYSTEM_ONLINE</span>
            </div>
        </header>

        <!-- Asset Navigation -->
        <div class="asset-tabs">
            <button class="asset-tab active" data-ticker="NDX">NASDAQ_100</button>
            <button class="asset-tab" data-ticker="XAU">GOLD_XAU</button>
            <button class="asset-tab" data-ticker="SPX">S&P_500</button>
            <button class="asset-tab" data-ticker="BTC">BITCOIN</button>
        </div>

        <!-- Main Grid -->
        <main class="dashboard-grid">
            <!-- Chart Section -->
            <section class="chart-card" style="grid-column: span 2;">
                <div class="card-header">
                    <h3 class="card-title" id="chartTitle">QUANT_ANOMALIES | ^NDX</h3>
                    <div class="chart-legend">
                        <span class="legend-item"><span class="dot" style="background:#22d3ee"></span>LOG_RETURN</span>
                        <span class="legend-item"><span class="dot" style="background:#22c55e"></span>BULL_SIGNAL</span>
                        <span class="legend-item"><span class="dot" style="background:#ef4444"></span>BEAR_SIGNAL</span>
                    </div>
                </div>
                <div class="chart-container" id="anomalyChart" style="height: 500px;"></div>
            </section>

            <!-- Sidebar: Stats & Alerts -->
            <aside class="sidebar-col">
                <!-- Last Alert -->
                <div class="signal-card" id="alertCard">
                    <div class="card-header">
                        <span class="card-title">LATEST_ANOMALY</span>
                    </div>
                    <div class="signal-content">
                        <div class="signal-main" id="alertStatus">NO_SIGNAL</div>
                        <div class="signal-meta">
                            <div class="meta-row">
                                <span>TIME_NY:</span>
                                <span class="mono" id="alertTime">--:--</span>
                            </div>
                            <div class="meta-row">
                                <span>Z_SCORE:</span>
                                <span class="mono" id="alertZScore">--</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Live Metrics -->
                <div class="report-card">
                    <h3 class="card-title">LIVE_METRICS</h3>
                    <div class="report-grid">
                        <div class="report-item">
                            <span class="report-label">PRICE</span>
                            <span class="report-value mono" id="currentPrice">--</span>
                        </div>
                        <div class="report-item">
                            <span class="report-label">Z_SCORE</span>
                            <span class="report-value mono" id="currentZScore">--</span>
                        </div>
                        <div class="report-item">
                            <span class="report-label">LOG_RET</span>
                            <span class="report-value mono" id="currentLogReturn">--</span>
                        </div>
                        <div class="report-item">
                            <span class="report-label">ATR</span>
                            <span class="report-value mono" id="currentATR">--</span>
                        </div>
                    </div>
                </div>

                <!-- Anomaly History List -->
                <div class="report-card">
                    <h3 class="card-title">EVENT_LOG</h3>
                    <div class="history-list" id="historyList" style="max-height: 200px; overflow-y: auto;">
                        <div class="history-item mono" style="color: var(--text-gray);">LOADING_DATA...</div>
                    </div>
                </div>
            </aside>
        </main>
    </div>

    <!-- Script -->
    <script>
        // Configuration
        const API_BASE = 'http://localhost:5001/api';
        const REFRESH_INTERVAL = 5000; // 5 seconds
        const Z_THRESHOLD = 2.0;

        // State
        let currentTicker = 'NDX';
        let chart = null;
        // Global series references
        let lineSeries = null;
        let meanSeries = null;
        let upperBandSeries = null;
        let lowerBandSeries = null;
        let anomalyLineSeries = null;

        // Init
        document.addEventListener('DOMContentLoaded', () => {
            initChart();
            setupAssetButtons();
            loadData(currentTicker);
            setInterval(() => loadData(currentTicker), REFRESH_INTERVAL);
        });

        function initChart() {
            const container = document.getElementById('anomalyChart');

            // Create Chart with Dark/Terminal Theme
            chart = LightweightCharts.createChart(container, {
                width: container.clientWidth,
                height: 500,
                layout: {
                    background: { type: 'solid', color: '#000000' },
                    textColor: '#9ca3af', // Gray-400
                    fontFamily: 'JetBrains Mono',
                },
                grid: {
                    vertLines: { color: '#111827' }, // Very dark gray
                    horzLines: { color: '#111827' },
                },
                crosshair: {
                    mode: LightweightCharts.CrosshairMode.Normal,
                    vertLine: { color: '#4b5563', style: 2 },
                    horzLine: { color: '#4b5563', style: 2 },
                },
                rightPriceScale: { borderColor: '#374151' },
                timeScale: {
                    borderColor: '#374151',
                    timeVisible: true,
                    secondsVisible: false,
                },
            });

            // 1. Log Return Series (The noisy white/gray line)
            lineSeries = chart.addLineSeries({
                color: '#e5e7eb', // Gray-200 (White-ish)
                lineWidth: 1,
                title: 'Log Return',
                crosshairMarkerVisible: true,
                priceFormat: { type: 'price', precision: 6, minMove: 0.000001 },
            });

            // 2. Mean Series (Cyan Dashed)
            meanSeries = chart.addLineSeries({
                color: '#06b6d4', // Cyan-500
                lineWidth: 1,
                lineStyle: 1, // Dashed
                title: 'Mean',
                crosshairMarkerVisible: false,
                priceFormat: { type: 'price', precision: 6, minMove: 0.000001 },
            });

            // 3. Upper Band (+2σ, Red Dotted)
            upperBandSeries = chart.addLineSeries({
                color: '#ef4444', // Red-500
                lineWidth: 1,
                lineStyle: 2, // Dotted
                title: '+2σ Band',
                crosshairMarkerVisible: false,
                priceFormat: { type: 'price', precision: 6, minMove: 0.000001 },
            });

            // 4. Lower Band (-2σ, Green Dotted)
            lowerBandSeries = chart.addLineSeries({
                color: '#22c55e', // Green-500
                lineWidth: 1,
                lineStyle: 2, // Dotted
                title: '-2σ Band',
                crosshairMarkerVisible: false,
                priceFormat: { type: 'price', precision: 6, minMove: 0.000001 },
            });

            // 5. Anomaly Connection Line (The "Trend" of anomalies)
            anomalyLineSeries = chart.addLineSeries({
                color: '#f59e0b', // Amber-500
                lineWidth: 1,
                title: 'Anomaly Trend',
                crosshairMarkerVisible: false,
                priceFormat: { type: 'price', precision: 6, minMove: 0.000001 },
            });

            // Resize Observer
            const resizeObserver = new ResizeObserver(entries => {
                if (entries.length === 0 || entries[0].target !== container) { return; }
                const newRect = entries[0].contentRect;
                chart.applyOptions({ width: newRect.width });
            });
            resizeObserver.observe(container);
        }

        function setupAssetButtons() {
            document.querySelectorAll('.asset-tab').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.asset-tab').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentTicker = btn.dataset.ticker;
                    loadData(currentTicker);
                });
            });
        }

        async function loadData(ticker) {
            try {
                // Ensure chart title matches
                document.getElementById('chartTitle').textContent = `QUANT_ANOMALIES | ${ticker}`;

                const [analysisRes, chartRes] = await Promise.all([
                    fetch(`${API_BASE}/analyze/${ticker}`),
                    fetch(`${API_BASE}/chart-data/${ticker}?limit=200`)
                ]);

                const analysis = await analysisRes.json();
                const chartData = await chartRes.json();

                if (analysis.success && chartData.success) {
                    updateChart(chartData.data);
                    updateStats(analysis.data);
                }
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('statusText').textContent = 'CONNECTION_ERR';
                document.querySelector('.status-dot').className = 'status-dot error';
            }
        }

        function updateChart(data) {
            const lineData = data.labels.map((label, i) => ({
                time: parseTime(label),
                value: data.log_returns[i]
            }));

            lineSeries.setData(lineData);

            // Markers for anomalies
            const markers = [];
            const anomalies = [];

            data.z_scores.forEach((z, i) => {
                if (Math.abs(z) >= Z_THRESHOLD) {
                    const isBullish = z < -Z_THRESHOLD;
                    const time = lineData[i].time;

                    markers.push({
                        time: time,
                        position: isBullish ? 'belowBar' : 'aboveBar',
                        color: isBullish ? '#22c55e' : '#ef4444', // Green-500 : Red-500
                        shape: isBullish ? 'arrowUp' : 'arrowDown',
                        text: isBullish ? 'BUY' : 'SELL',
                        size: 2,
                    });

                    anomalies.push({
                        time: data.labels[i],
                        zScore: z,
                        isBullish,
                        price: data.prices ? data.prices[i] : 0
                    });
                }
            });

            lineSeries.setMarkers(markers);
            updateHistoryList(anomalies);

            // Check for last alert
            if (anomalies.length > 0) {
                const last = anomalies[anomalies.length - 1];
                updateAlertCard(last);
            }
        }

        function updateStats(data) {
            document.getElementById('currentPrice').textContent = data.price.current.toFixed(2);

            // Z-Score Color
            const z = data.analysis.z_score;
            const zEl = document.getElementById('currentZScore');
            zEl.textContent = z ? z.toFixed(3) : '--';
            zEl.style.color = Math.abs(z) > 2 ? (z < 0 ? '#22c55e' : '#ef4444') : '#9ca3af';

            // Log Return
            const r = data.analysis.log_return;
            const rEl = document.getElementById('currentLogReturn');
            rEl.textContent = r ? r.toFixed(6) : '--';

            // ATR
            if (data.analysis.atr) {
                document.getElementById('currentATR').textContent = data.analysis.atr.toFixed(2);
            }
        }

        function updateAlertCard(anomaly) {
            const card = document.getElementById('alertCard');
            const status = document.getElementById('alertStatus');
            const timeEl = document.getElementById('alertTime');
            const zEl = document.getElementById('alertZScore');

            const isBullish = anomaly.isBullish;
            status.textContent = isBullish ? 'BULLISH_IMPULSE' : 'BEARISH_IMPULSE';
            status.style.color = isBullish ? '#22c55e' : '#ef4444';

            const date = new Date(anomaly.time);
            timeEl.textContent = date.toLocaleTimeString('en-US', { hour12: false });
            zEl.textContent = anomaly.zScore.toFixed(2);
        }

        function updateHistoryList(anomalies) {
            const list = document.getElementById('historyList');
            list.innerHTML = '';

            // Show last 10 reversed
            anomalies.slice(-10).reverse().forEach(a => {
                const div = document.createElement('div');
                div.className = 'history-item mono';
                div.style.display = 'flex';
                div.style.justifyContent = 'space-between';
                div.style.marginBottom = '5px';

                const timeStr = new Date(a.time).toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit' });
                const type = a.isBullish ? 'BUY' : 'SELL';
                const color = a.isBullish ? '#22c55e' : '#ef4444';

                div.innerHTML = `
                    <span style="color:${color}">${type}</span>
                    <span>${a.zScore.toFixed(2)}</span>
                    <span style="color:#6b7280">${timeStr}</span>
                `;
                list.appendChild(div);
            });
        }

        function parseTime(timeStr) {
            return new Date(timeStr).getTime() / 1000;
        }
    </script>
</body>

</html>
